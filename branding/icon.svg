<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft light: a gentle radial glow from the upper-centre, fading to near-black. -->
    <radialGradient id="glow" cx="50%" cy="33%" r="82%">
      <stop offset="0%" stop-color="#52525E"/>
      <stop offset="45%" stop-color="#202024"/>
      <stop offset="100%" stop-color="#08080A"/>
    </radialGradient>
    <!-- Ground shadow under the whole book, on the tile. -->
    <filter id="bookShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- The top page casts a soft shadow onto the sheet behind it. -->
    <filter id="pageShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="7" dy="9" stdDeviation="9" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- macOS-style rounded tile: inset margin + continuous corner radius, with
       transparent corners so it sits beside other dock icons. -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="url(#glow)"/>

  <!-- Open book: a left page, and on the right a front (turning) page over a
       back sheet. Three explicit shapes so the front page's edge reads against
       the sheet behind it (the traced source had merged them into one). -->
  <g filter="url(#bookShadow)">
    <!-- Left page (gentle outward tilt). -->
    <rect x="320" y="356" width="170" height="300" rx="26" ry="26" fill="#F3EFE6"
          transform="rotate(-5 405 506)"/>
    <!-- Back sheet: same tilt as the front page, nudged up-right so a clean
         second sheet peeks out behind it. -->
    <rect x="552" y="346" width="170" height="300" rx="26" ry="26" fill="#F3EFE6"
          transform="rotate(5 637 496)"/>
    <!-- Front (turning) page on top, casting a soft shadow onto the back sheet. -->
    <g filter="url(#pageShadow)">
      <rect x="534" y="356" width="170" height="300" rx="26" ry="26" fill="#F3EFE6"
            transform="rotate(5 619 506)"/>
    </g>
  </g>
</svg>
