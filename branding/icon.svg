<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft light: a gentle radial glow from the upper-centre, fading to near-black. -->
    <radialGradient id="glow" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#2A2A30"/>
      <stop offset="55%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#08080A"/>
    </radialGradient>
    <filter id="bookShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- macOS-style rounded tile: inset margin + continuous corner radius, with
       transparent corners so it sits beside other dock icons. -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="url(#glow)"/>

  <!-- The open-book mark, vectorised from the app icon, enlarged about its centre. -->
  <g transform="translate(514,464) scale(1.5) translate(-514,-464)">
    <g transform="translate(0,1024) scale(0.1,-0.1)" fill="#F3EFE6" filter="url(#bookShadow)">
