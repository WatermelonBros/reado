name: Bug report
description: Something doesn't work the way it should.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please search existing issues first.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a folder with…
        2. Click…
        3. See…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Reado version
      description: From the title bar, About, or the git commit you built.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Any error output, console logs, or screenshots. Drag images in.
    validations:
      required: false
