# Cross-platform release builds for Reado.
#
# Triggered by pushing a version tag (e.g. `v0.1.0`) or manually. Produces
# native installers for macOS (Apple Silicon + Intel), Linux (AppImage + .deb)
# and Windows (MSI + NSIS), and publishes them to a draft GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      # Serialize: tauri-action merges each platform into the release's
      # latest.json by read-modify-write, which races (and drops platforms)
      # when jobs run in parallel. One at a time keeps the manifest complete.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: windows-latest
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Both Apple targets are needed on macOS runners.
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the CLI sidecar for this matrix target (externalBin requires the
      # binary named for the exact target triple being built).
      - name: Build the CLI sidecar
        shell: bash
        run: bash scripts/bundle-cli.sh ${{ matrix.rust_target }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts so clients can verify them against the
          # public key in tauri.conf.json. Set these as repository secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (Apple Developer ID). Ignored on
          # other platforms. Without these, macOS marks the app as "damaged".
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Reado ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install Reado for your platform. Reado updates itself automatically from signed releases."
          releaseDraft: true
          prerelease: false
          # Emit latest.json (the updater manifest) alongside the installers.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
