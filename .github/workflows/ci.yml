# Continuous integration: lint, typecheck, and build-check on every push/PR.
# Cross-platform release artifacts are built separately in release.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Check formatting
        run: |
          for crate in crates/reado-core crates/reado-cli src-tauri; do
            cargo fmt --manifest-path "$crate/Cargo.toml" --all -- --check
          done
      - name: Clippy
        run: |
          for crate in crates/reado-core crates/reado-cli src-tauri; do
            cargo clippy --manifest-path "$crate/Cargo.toml" --all-targets -- -D warnings
          done
      - name: Test
        run: |
          cargo test --manifest-path crates/reado-core/Cargo.toml
          cargo test --manifest-path crates/reado-cli/Cargo.toml
          cargo test --manifest-path src-tauri/Cargo.toml
