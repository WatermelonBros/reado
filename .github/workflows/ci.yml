# Continuous integration: lint, typecheck, test (incl. UI) and build-check.
# UI + pure-crate tests run on macOS / Windows / Linux so the app is exercised on
# every shipped OS. Full Tauri (fmt/clippy/build-deps) runs on Linux.
# Cross-platform release artifacts are built separately in release.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:coverage # logic + UI (happy-dom) with coverage gate — same on every OS
      - run: pnpm build

  rust-crates:
    name: Rust crates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/reado-core
      # Pure crates — no Tauri sidecar / system deps needed. These hold the
      # OS-divergent logic (path anchoring, sessions, forge, search), so run them
      # on every OS to catch separator/case-sensitivity regressions.
      - name: Test core + cli
        run: |
          cargo test --manifest-path crates/reado-core/Cargo.toml
          cargo test --manifest-path crates/reado-cli/Cargo.toml

  rust-tauri:
    name: Rust Tauri (fmt + clippy + test, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # tauri.conf.json declares the CLI as an externalBin sidecar, so Tauri's
      # build script requires the binary to exist even for clippy/test.
      - name: Build the CLI sidecar
        run: bash scripts/bundle-cli.sh
      - name: Check formatting
        run: |
          for crate in crates/reado-core crates/reado-cli src-tauri; do
            cargo fmt --manifest-path "$crate/Cargo.toml" --all -- --check
          done
      - name: Clippy
        run: |
          for crate in crates/reado-core crates/reado-cli src-tauri; do
            cargo clippy --manifest-path "$crate/Cargo.toml" --all-targets -- -D warnings
          done
      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
